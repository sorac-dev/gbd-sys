# ==============================================================================
# GUÍA DE COMANDOS SSH PARA ACTIVAR ESTE SITIO EN TU SERVIDOR NGINX:
# ==============================================================================
#
# 1. Crear el archivo en sites-available (si no existe):
#    sudo nano /etc/nginx/sites-available/gdb.conf
#    (Pega aquí todo el contenido de este archivo config)
#
# 2. Habilitar el sitio creando un enlace simbólico en sites-enabled:
#    sudo ln -s /etc/nginx/sites-available/gdb.conf /etc/nginx/sites-enabled/gdb.conf
#
# 3. Validar que la sintaxis de Nginx sea correcta:
#    sudo nginx -t
#
# 4. Si todo está correcto, recargar/reiniciar Nginx para aplicar cambios:
#    sudo systemctl reload nginx
#
# ==============================================================================
server {
    listen 443 ssl http2;
    server_name gdb.sorac.dev;

    root /var/www/gdb/public;
    index index.php;

    access_log /var/log/nginx/gdb.app-access.log;
    error_log  /var/log/nginx/gdb.app-error.log error;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_prefer_server_ciphers on;

    # Optimización del tamaño de cuerpo de peticiones para cargas de archivos de gran volumen
    client_max_body_size 6000m;
    client_body_timeout 600s;
    client_body_buffer_size 512k;

    sendfile off;

    # Cabeceras HTTP de seguridad para mitigar ataques de clickjacking y cross-site scripting (XSS)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Restricción de acceso directo a archivos sensibles de entorno, configuración y control de versiones
    location ~ /\.(env|git|ht) {
        deny all;
    }

    location ~* \.(sh|bash|sql|log)$ {
        deny all;
    }

  
    # ==============================================================================
    # INTEGRACIÓN CON PROCESADOR PHP-FPM (SOCKET UNIX)
    # ==============================================================================
    location ~ \.php$ {

        # Desactivar el almacenamiento en búfer de solicitudes para optimizar subidas de gran volumen
        fastcgi_request_buffering off;

        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";

        fastcgi_intercept_errors off;

        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;

        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    # Procesamiento y enrutamiento genérico hacia el Front Controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}

# Redirección permanente y forzada de tráfico inseguro (HTTP Puerto 80) a HTTPS
server {
    listen 80;
    server_name gdb.sorac.dev;
    return 301 https://$host$request_uri;
}