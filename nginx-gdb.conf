server {
    listen 80;
    listen [::]:80;
    server_name gdb.sorac.dev;
    
    # Redirigir todo el tráfico HTTP a HTTPS (Cloudflare SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gdb.sorac.dev;

    # El directorio raíz debe apuntar a la carpeta public del MVC
    root /var/www/html/gdb/public;
    index index.php index.html index.htm;

    # Certificados SSL suministrados por Cloudflare
    ssl_certificate /etc/nginx/ssl/cert-sorac.pem;
    ssl_certificate_key /etc/nginx/ssl/key-sorac.pem;

    # Parámetros optimizados de seguridad para SSL/TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Cabeceras de seguridad recomendadas
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;" always;

    # Registro de Logs
    access_log /var/log/nginx/gdb_access.log;
    error_log /var/log/nginx/gdb_error.log;

    # Reescribir URLs para pasar la petición al Front Controller (index.php?url=...)
    location / {
        try_files $uri $uri/ /index.php?url=$query_string;
    }

    # Procesar scripts de PHP utilizando PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # Opciones comunes de PHP-FPM socket (Ajusta la versión de tu PHP según corresponda)
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        
        # Si usas PHP por puerto TCP en vez de socket (descomenta la siguiente y comenta la anterior):
        # fastcgi_pass 127.0.0.1:9000;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Tiempos de espera optimizados
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
    }

    # Bloquear acceso a archivos ocultos (por ejemplo, archivos .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear acceso a archivos sensibles del framework
    location ~* \.(env|log|sql|md|gitignore|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Optimización de caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }
}
